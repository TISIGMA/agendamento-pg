version: "3.9"

networks:
  traefik_public:
    external: true

services:
  app:
    image: agendamento-app:latest
    networks:
      - traefik_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.agendamento.rule=Host(`agendamento1.sigmatransportes.com.br`)"
        - "traefik.http.routers.agendamento.entrypoints=websecure"
        - "traefik.http.routers.agendamento.tls.certresolver=le"
        - "traefik.http.services.agendamento.loadbalancer.server.port=80"
        - "traefik.docker.network=traefik_public"
